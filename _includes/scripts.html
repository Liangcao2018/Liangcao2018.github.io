<script>
// Disable greedy-nav: show all nav links
function updateNav(){}
$(function(){
  $('#site-nav .hidden-links').children().appendTo('#site-nav .visible-links');
  $('#site-nav .hidden-links').remove();
  $('#site-nav button').remove();
});
$(window).off('resize', updateNav);
</script>
